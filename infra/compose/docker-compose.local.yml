services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: proposalflow
      POSTGRES_PASSWORD: proposalflow
      POSTGRES_USER: proposalflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_PASSWORD: proposalflow123
      MINIO_ROOT_USER: proposalflow
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  minio_data:
  postgres_data:
  redis_data:
